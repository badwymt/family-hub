<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9A5A"/>
      <stop offset="1" stop-color="#FF6A35"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF3E9"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background so the maskable crop always shows orange -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- decorative star top-right (inside safe zone) -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M360 150
      l11 23 25 4 -18 18 4 25 -22 -12 -22 12 4 -25 -18 -18 25 -4 z"/>
  </g>
  <!-- small sparkle -->
  <circle cx="150" cy="150" r="7" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="178" cy="128" r="4" fill="#FFFFFF" opacity="0.6"/>

  <!-- House: roof + body, centered in safe zone -->
  <g>
    <!-- roof -->
    <path d="M256 168 L388 268 L124 268 Z" fill="url(#house)"/>
    <!-- body -->
    <rect x="150" y="262" width="212" height="150" rx="16" fill="url(#house)"/>
    <!-- door -->
    <rect x="232" y="318" width="48" height="94" rx="10" fill="#FF7A45"/>
    <!-- heart on door -->
    <path d="M256 345
      c-6 -10 -22 -7 -22 5
      c0 9 12 16 22 24
      c10 -8 22 -15 22 -24
      c0 -12 -16 -15 -22 -5 z" fill="#FFFFFF"/>
    <!-- windows -->
    <rect x="172" y="300" width="40" height="40" rx="8" fill="#FFD7B0"/>
    <rect x="300" y="300" width="40" height="40" rx="8" fill="#FFD7B0"/>
  </g>
</svg>
