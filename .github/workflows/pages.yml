name: Deploy to GitHub Pages

# Publishes the static app in web/ to GitHub Pages on every push to main.
# (Only needed if you choose GitHub Pages over Cloudflare Pages. GitHub Pages on
# a FREE plan requires a PUBLIC repo; for a private repo use Cloudflare Pages —
# see DEPLOY.md. The published app exposes only the public anon key, never the
# shared password, so a public repo is acceptable.)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload the web/ folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
