name: Supabase keep-alive

# Pings a lightweight DB function once a day so the free-tier project never hits
# the 7-day inactivity pause. No secrets needed — the publishable anon key is
# public by design (RLS protects the data) and ping() only returns 'ok'.

on:
  schedule:
    - cron: "17 7 * * *" # every day at 07:17 UTC
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the ping() health RPC
        env:
          SUPABASE_URL: https://shnbrpvuzbkcqvxvvxlr.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_YqvSfUZ6_3x4dWTjdDPwcA_3pUWSYtr
        run: |
          code=$(curl -s -o /tmp/out -w "%{http_code}" -X POST \
            "$SUPABASE_URL/rest/v1/rpc/ping" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" -d '{}')
          echo "ping -> HTTP $code, body: $(cat /tmp/out)"
          test "$code" = "200"
